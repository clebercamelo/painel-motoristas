<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Painel de Chamadas - Acompanhamento Duplo</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }

        body {
            background-color: #0d0f12;
            color: #e2e8f0;
            padding: 20px;
            display: flex;
            flex-direction: column;
            align-items: center;
            min-height: 100vh;
        }

        .container {
            width: 100%;
            max-width: 950px;
            margin: 0 auto;
        }

        header {
            text-align: center;
            margin-bottom: 25px;
            border-bottom: 1px solid #1e293b;
            padding-bottom: 15px;
            position: relative;
        }

        header h1 {
            color: #ff6b00;
            font-size: 34px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 2px;
            text-shadow: 0 0 20px rgba(255, 107, 0, 0.3);
        }

        header p {
            color: #94a3b8;
            margin-top: 6px;
            font-size: 16px;
            font-weight: 500;
        }

        .chamado-principal {
            background: linear-gradient(135deg, #151922 0%, #0f1319 100%);
            border: 3px solid #ff6b00;
            border-radius: 20px;
            padding: 30px;
            text-align: center;
            box-shadow: 0 0 35px rgba(255, 107, 0, 0.2);
            margin-bottom: 25px;
            animation: pulsar-borda 2s infinite alternate;
        }

        @keyframes pulsar-borda {
            from { border-color: #ff6b00; box-shadow: 0 0 25px rgba(255, 107, 0, 0.15); }
            to { border-color: #ff9e59; box-shadow: 0 0 45px rgba(255, 107, 0, 0.35); }
        }

        .chamado-principal h2 {
            color: #94a3b8;
            font-size: 18px;
            text-transform: uppercase;
            letter-spacing: 3px;
            margin-bottom: 20px;
            font-weight: 700;
        }

        .bancada-destacada {
            color: #ff6b00;
            font-size: 36px;
            font-weight: 900;
            text-shadow: 0 0 15px rgba(255, 107, 0, 0.4);
            display: inline-block;
            margin-left: 5px;
        }

        .destaque-dupla-flex {
            display: flex;
            gap: 20px;
            justify-content: space-between;
            flex-wrap: wrap;
            margin-bottom: 15px;
        }

        .motorista-destaque-box {
            flex: 1;
            min-width: 260px;
            background: #1e2530;
            padding: 20px;
            border-radius: 16px;
            border: 1px solid #2e3748;
            border-left: 8px solid #10b981; 
            text-align: left;
        }

        .motorista-destaque-box.retardatario {
            border-left-color: #ef4444; 
            background: #271a21;
            border-color: #4a202d;
        }

        .nome-grande {
            font-size: 28px;
            font-weight: 900;
            color: #10b981; 
            margin-bottom: 12px;
            word-wrap: break-word;
            min-height: 70px;
            display: flex;
            align-items: center;
            text-shadow: 0 0 10px rgba(16, 185, 129, 0.2);
        }

        .retardatario .nome-grande {
            color: #ef4444; 
            font-style: italic;
            text-shadow: 0 0 10px rgba(239, 68, 68, 0.2);
        }

        .gaiola-badge {
            display: inline-block;
            background-color: rgba(16, 185, 129, 0.15);
            color: #10b981;
            padding: 6px 14px;
            border-radius: 8px;
            font-weight: 800;
            font-size: 16px;
            border: 1px solid rgba(16, 185, 129, 0.3);
            letter-spacing: 1px;
        }

        .retardatario .gaiola-badge {
            background-color: rgba(239, 68, 68, 0.15);
            color: #ef4444;
            border-color: rgba(239, 68, 68, 0.3);
        }

        .meta-chamado {
            margin-top: 15px;
            display: flex;
            justify-content: center;
            gap: 20px;
            font-size: 16px;
            color: #ff6b00;
            border-top: 1px solid #1e293b;
            padding-top: 12px;
            font-weight: 700;
        }

        .chamado-principal.vazio {
            animation: none;
            border-color: #2e3748;
            box-shadow: none;
        }

        .historico-section {
            background-color: #11151d;
            border: 1px solid #1e293b;
            border-radius: 16px;
            padding: 20px;
        }

        .historico-section h3 {
            font-size: 18px;
            color: #94a3b8;
            margin-bottom: 15px;
            border-bottom: 2px solid #1e293b;
            padding-bottom: 10px;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .chamada-item {
            padding: 14px;
            border-bottom: 1px solid #1e293b;
            font-size: 16px;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .chamada-item:last-child { border-bottom: none; }
        .motorista-col { font-weight: 800; color: #10b981; font-size: 17px; }
        .motorista-col.ausente { color: #ef4444; font-style: italic; }
        .gaiola-col { font-size: 14px; color: #94a3b8; font-weight: 600; margin-top: 2px; }
        
        .bancada-badge {
            background-color: #ff6b00;
            padding: 5px 12px;
            border-radius: 30px;
            font-weight: 800;
            color: #0d0f12;
            font-size: 14px;
            text-transform: uppercase;
        }

        .sem-chamadas { text-align: center; color: #64748b; padding: 30px 0; font-size: 16px; }

        #audioPermissao {
            position: fixed;
            top: 15px;
            right: 15px;
            background: #ff6b00;
            color: #0d0f12;
            padding: 12px 24px;
            border-radius: 30px;
            font-weight: 800;
            cursor: pointer;
            z-index: 1000;
            display: flex;
            align-items: center;
            gap: 8px;
            border: none;
            font-size: 14px;
        }

        #audioPermissao.ativo { background: #1e293b; color: #94a3b8; box-shadow: none; }

        /* ======================================================= */
        /* CORREÇÃO VOLTADA PARA TELAS MENORES (CELULAR)           */
        /* ======================================================= */
        @media (max-width: 600px) {
            body { padding: 10px; }
            header h1 { font-size: 22px !important; }
            header p { font-size: 13px !important; }
            
            #audioPermissao {
                position: static !important;
                width: 100% !important;
                margin-bottom: 15px !important;
                border-radius: 12px !important;
                justify-content: center !important;
                padding: 10px !important;
                font-size: 13px !important;
            }

            /* Container Compacto */
            .chamado-principal {
                padding: 12px !important;
                margin-bottom: 12px !important;
                border-radius: 12px !important;
            }

            .chamado-principal h2 { font-size: 14px !important; margin-bottom: 12px !important; }
            .bancada-destacada { font-size: 22px !important; }

            /* Alinhamento Forçado Vertical */
            .destaque-dupla-flex {
                flex-direction: column !important;
                gap: 10px !important;
            }

            .motorista-destaque-box {
                min-width: 100% !important;
                width: 100% !important;
                padding: 12px !important;
                border-radius: 10px !important;
                text-align: center !important; /* Centraliza todo o conteúdo */
                border-left: none !important;
                border-top: 5px solid #10b981 !important; /* Barra de cor no topo */
            }

            .motorista-destaque-box.retardatario { border-top-color: #ef4444 !important; }

            /* Nome centralizado e tamanho responsivo */
            .nome-grande { 
                font-size: 20px !important; 
                min-height: auto !important; 
                justify-content: center !important; 
                text-align: center !important;
                margin-bottom: 6px !important;
                display: block !important;
                width: 100% !important;
            }

            .gaiola-badge { font-size: 13px !important; padding: 4px 8px !important; display: inline-block !important; }
            .meta-chamado { font-size: 12px !important; padding-top: 8px !important; margin-top: 8px !important; }

            /* Histórico Redimensionado */
            .chamada-item { flex-direction: column !important; align-items: stretch !important; gap: 10px !important; padding: 10px 0 !important; }
            .chamada-item > div:first-child { width: 100% !important; gap: 10px !important; display: flex !important; }
            .motorista-col { font-size: 14px !important; }
            .gaiola-col { font-size: 12px !important; }
            .chamada-item > div:last-child { display: flex !important; justify-content: space-between !important; align-items: center !important; border-top: 1px dashed #1e293b !important; padding-top: 6px !important; }
        }
    </style>
</head>
<body>

    <button id="audioPermissao" onclick="ativarAudio()">
        🔔 ATIVAR ÁUDIO E SOM DO PAINEL
    </button>

    <div class="container">
        <header>
            <h1>Painel de Chamadas</h1>
            <p>Chamadas em Tempo Real (Duplas de Carga)</p>
        </header>

        <!-- Destaque Principal -->
        <div class="chamado-principal" id="containerDestaque" style="display: none;">
            <h2>Chamando Agora na <span class="bancada-destacada" id="destaqueBancada">Bancada -</span></h2>
            
            <div class="destaque-dupla-flex">
                <div class="motorista-destaque-box" id="boxImpar">
                    <div class="nome-grande" id="nomeImpar">-</div>
                    <div style="text-align: center; width: 100%;">
                        <span class="gaiola-badge" id="gaiolaImpar">-</span>
                    </div>
                </div>

                <div class="motorista-destaque-box" id="boxPar">
                    <div class="nome-grande" id="nomePar">-</div>
                    <div style="text-align: center; width: 100%;">
                        <span class="gaiola-badge" id="gaiolaPar">-</span>
                    </div>
                </div>
            </div>

            <div class="meta-chamado">
                <span>Horário da Chamada: <span id="destaqueHora">00:00</span></span>
            </div>
        </div>

        <!-- Mensagem de Espera -->
        <div class="chamado-principal vazio" id="containerVazio">
            <h2 style="color: #ff6b00; margin-bottom: 10px; font-size: 18px;">Aguardando chamada inicial...</h2>
            <p style="color: #94a3b8; font-size: 14px;">As próximas duplas aparecerão aqui.</p>
        </div>

        <!-- Histórico -->
        <div class="historico-section">
            <h3>Últimas Duplas Chamadas</h3>
            <div id="listaHistorico">
                <div class="sem-chamadas">Nenhuma chamada realizada ainda.</div>
            </div>
        </div>
    </div>

    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/9.23.0/firebase-database-compat.js"></script>

    <script>
        const firebaseConfig = {
            apiKey: "AIzaSyCndSz1N8C_i94VbQsVLu9VUIEI1du-KAo",
            authDomain: "sistema-drives.firebaseapp.com",
            databaseURL: "https://sistema-drives-default-rtdb.firebaseio.com",
            projectId: "sistema-drives",
            storageBucket: "sistema-drives.firebasestorage.app",
            messagingSenderId: "90142488187",
            appId: "1:90142488187:web:e78be9ed5943ee8e7a54de"
        };

        firebase.initializeApp(firebaseConfig);
        const database = firebase.database();

        const containerDestaque = document.getElementById('containerDestaque');
        const containerVazio = document.getElementById('containerVazio');
        const nomeImpar = document.getElementById('nomeImpar');
        const gaiolaImpar = document.getElementById('gaiolaImpar');
        const boxImpar = document.getElementById('boxImpar');
        const nomePar = document.getElementById('nomePar');
        const gaiolaPar = document.getElementById('gaiolaPar');
        const boxPar = document.getElementById('boxPar');
        const destaqueBancada = document.getElementById('destaqueBancada');
        const destaqueHora = document.getElementById('destaqueHora');
        const listaHistorico = document.getElementById('listaHistorico');
        const btnAudio = document.getElementById('audioPermissao');

        let ultimoIdChamado = null;
        let audioAtivo = false;
        let audioContext = null;

        function ativarAudio() {
            audioAtivo = true;
            if (!audioContext) {
                audioContext = new (window.AudioContext || window.webkitAudioContext)();
            }
            btnAudio.innerText = "🔔 SOM E VOZ ATIVADOS";
            btnAudio.classList.add('ativo');
            tocarSininho();
            setTimeout(() => { falarTexto("Áudio ativado."); }, 600);
            setTimeout(() => { btnAudio.style.display = 'none'; }, 2000);
        }

        function tocarSininho() {
            if (!audioAtivo || !audioContext) return;
            try {
                let osc1 = audioContext.createOscillator();
                let gain1 = audioContext.createGain();
                osc1.type = 'sine';
                osc1.frequency.setValueAtTime(587.33, audioContext.currentTime); 
                gain1.gain.setValueAtTime(0.3, audioContext.currentTime);
                gain1.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.4);
                osc1.connect(gain1); gain1.connect(audioContext.destination);
                osc1.start(); osc1.stop(audioContext.currentTime + 0.4);

                setTimeout(() => {
                    let osc2 = audioContext.createOscillator();
                    let gain2 = audioContext.createGain();
                    osc2.type = 'sine';
                    osc2.frequency.setValueAtTime(880.00, audioContext.currentTime); 
                    gain2.gain.setValueAtTime(0.3, audioContext.currentTime);
                    gain2.gain.exponentialRampToValueAtTime(0.01, audioContext.currentTime + 0.5);
                    osc2.connect(gain2); gain2.connect(audioContext.destination);
                    osc2.start(); osc2.stop(audioContext.currentTime + 0.5);
                }, 150);
            } catch (e) { console.log(e); }
        }

        function falarTexto(texto) {
            if (!audioAtivo) return;
            window.speechSynthesis.cancel(); 
            const mensagemVoz = new SpeechSynthesisUtterance(texto);
            mensagemVoz.lang = 'pt-BR';
            mensagemVoz.rate = 0.95; 
            window.speechSynthesis.speak(mensagemVoz);
        }

        function ejecutarChamadaCompleta(dadosDupla) {
            tocarSininho();
            setTimeout(() => {
                let frase = "";
                const temImpar = dadosDupla.nomeImpar && dadosDupla.nomeImpar !== "AGUARDANDO...";
                const temPar = dadosDupla.nomePar && dadosDupla.nomePar !== "AGUARDANDO...";
                if (temImpar && temPar) {
                    frase = `Atenção motoristas, ${dadosDupla.nomeImpar} e ${dadosDupla.nomePar}. Comparecer à bancada número ${dadosDupla.bancada}.`;
                } else if (temImpar) {
                    frase = `Atenção motorista, ${dadosDupla.nomeImpar}. Comparecer à bancada número ${dadosDupla.bancada}.`;
                } else if (temPar) {
                    frase = `Atenção motorista, ${dadosDupla.nomePar}. Comparecer à bancada número ${dadosDupla.bancada}.`;
                } else { return; }
                falarTexto(frase);
            }, 800);
        }

        function extrairDadosGaiola(gaiolaStr) {
            if (!gaiolaStr) return null;
            let limpo = gaiolaStr.trim().toUpperCase().replace(/\s+/g, '');
            const match = limpo.match(/^([A-Z]+)-?(\d+)$/);
            if (match) {
                const letra = match[1];
                const numero = parseInt(match[2], 10);
                const numeroPadrao = numero < 10 ? `0${numero}` : numero;
                return { letra, numero, gaiolaTexto: `${letra}-${numeroPadrao}` };
            }
            return null;
        }

        database.ref('fila').on('value', function(snapshot) {
            let todosRegistros = [];
            snapshot.forEach(function(childSnapshot) {
                const dados = childSnapshot.val();
                if (dados.status === "chamado") {
                    todosRegistros.push({
                        id: childSnapshot.key,
                        name: dados.nome,
                        gaiola: dados.gaiola,
                        bancada: dados.bancada,
                        horaChamado: dados.horaChamado || "--:--",
                        timestamp: dados.timestamp || 0
                    });
                }
            });

            todosRegistros.sort((a, b) => b.timestamp - a.timestamp);

            if (todosRegistros.length === 0) {
                containerDestaque.style.display = "none";
                containerVazio.style.display = "block";
                listaHistorico.innerHTML = '<div class="sem-chamadas">Nenhuma chamada realizada ainda.</div>';
                return;
            }

            let duplasAgrupadas = [];
            let processadosIds = new Set();

            todosRegistros.forEach(registro => {
                if (processadosIds.has(registro.id)) return;
                const infoG = extrairDadosGaiola(registro.gaiola);
                if (!infoG) return;

                let numParceiro = infoG.numero % 2 !== 0 ? infoG.numero + 1 : infoG.numero - 1;
                let numPFormatado = numParceiro < 10 ? `0${numParceiro}` : numParceiro;
                let textoParceiroAlvo = `${infoG.letra}-${numPFormatado}`;

                let parceiroMatch = todosRegistros.find(r => {
                    if (r.id === registro.id || processadosIds.has(r.id)) return false;
                    const infoR = extrairDadosGaiola(r.gaiola);
                    return infoR && infoR.gaiolaTexto === textoParceiroAlvo && r.bancada === registro.bancada && r.horaChamado === registro.horaChamado;
                });

                let itemDupla = { bancada: registro.bancada, horaChamado: registro.horaChamado, timestamp: registro.timestamp, idPrincipal: registro.id };
                if (infoG.numero % 2 !== 0) {
                    itemDupla.nomeImpar = registro.name; itemDupla.gaiolaImpar = infoG.gaiolaTexto;
                    itemDupla.nomePar = parceiroMatch ? parceiroMatch.name : "AGUARDANDO..."; itemDupla.gaiolaPar = textoParceiroAlvo;
                } else {
                    itemDupla.nomePar = registro.name; itemDupla.gaiolaPar = infoG.gaiolaTexto;
                    itemDupla.nomeImpar = parceiroMatch ? parceiroMatch.name : "AGUARDANDO..."; itemDupla.gaiolaImpar = textoParceiroAlvo;
                }
                duplasAgrupadas.push(itemDupla);
                processadosIds.add(registro.id);
                if (parceiroMatch) processadosIds.add(parceiroMatch.id);
            });

            const atual = duplasAgrupadas[0];
            nomeImpar.innerText = atual.nomeImpar;
            gaiolaImpar.innerText = `Gaiola ${atual.gaiolaImpar}`;
            if (atual.nomeImpar === "AGUARDANDO...") boxImpar.classList.add('retardatario'); else boxImpar.classList.remove('retardatario');

            nomePar.innerText = atual.nomePar;
            gaiolaPar.innerText = `Gaiola ${atual.gaiolaPar}`;
            if (atual.nomePar === "AGUARDANDO...") boxPar.classList.add('retardatario'); else boxPar.classList.remove('retardatario');

            destaqueBancada.innerText = atual.bancada;
            destaqueHora.innerText = atual.horaChamado;
            containerVazio.style.display = "none";
            containerDestaque.style.display = "block";

            if (ultimoIdChamado && ultimoIdChamado !== atual.idPrincipal) { ejecutarChamadaCompleta(atual); }
            ultimoIdChamado = atual.idPrincipal;

            let historicoHTML = "";
            const listaHistoricoItens = duplasAgrupadas.slice(1);
            if (listaHistoricoItens.length > 0) {
                listaHistoricoItens.forEach(function(item) {
                    historicoHTML += `
                        <div class="chamada-item">
                            <div style="display: flex; gap: 10px; width: 100%; justify-content: space-between;">
                                <div style="flex: 1;">
                                    <div class="motorista-col ${item.nomeImpar === 'AGUARDANDO...' ? 'ausente' : ''}">${item.nomeImpar}</div>
                                    <div class="gaiola-col">Gaiola: ${item.gaiolaImpar}</div>
                                </div>
                                <div style="flex: 1; text-align: right;">
                                    <div class="motorista-col ${item.nomePar === 'AGUARDANDO...' ? 'ausente' : ''}">${item.nomePar}</div>
                                    <div class="gaiola-col">Gaiola: ${item.gaiolaPar}</div>
                                </div>
                            </div>
                            <div style="display: flex; justify-content: space-between; align-items: center; width: 100%; border-top: 1px dashed #1e293b; margin-top: 5px; padding-top: 5px;">
                                <span style="font-size: 12px; color: #64748b;">${item.horaChamado}</span>
                                <span class="bancada-badge">${item.bancada}</span>
                            </div>
                        </div>
                    `;
                });
                listaHistorico.innerHTML = historicoHTML;
            } else { listaHistorico.innerHTML = '<div class="sem-chamadas">Nenhuma chamada anterior na lista.</div>'; }
        });
    </script>
</body>
</html>
